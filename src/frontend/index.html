<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Voice AI Agent</title>

    <style>
      body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
      }

      h3 {
        color: #333;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        background: #007bff;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #0056b3;
      }

      #log {
        margin-top: 15px;
        padding: 10px;
        background: black;
        color: #0f0;
        height: 200px;
        overflow-y: scroll;
      }
    </style>
  </head>

  <body>
    <h3>🎤 Voice AI Agent Demo</h3>

    <p><b>Session:</b> <span id="session">patient_456</span></p>

    <button id="test">Send Test Transcript</button>
    <button id="clear">Clear Log</button>

    <pre id="log"></pre>

    <script type="module" src="./client.js"></script>

    <script>
      document.getElementById("clear").onclick = () => {
        document.getElementById("log").textContent = "";
      };
    </script>
  </body>
</html>
